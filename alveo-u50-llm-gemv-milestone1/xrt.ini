# xrt.ini -- XRT runtime configuration picked up automatically when placed in
# the same directory as the host executable. Keep it minimal: opt-in to a few
# diagnostics that are cheap and informative, leave heavy profiling off so it
# does not perturb timing measurements in main.cpp.
#
# Reference: https://xilinx.github.io/XRT/master/html/xrt_ini.html

[Runtime]
# Verbosity 4 = info, useful when first bringing the design up. Set to 2 once
# things work to reduce noise.
verbosity = 4
runtime_log = console

[Debug]
# Lightweight diagnostics. Enable these by uncommenting if you need them; they
# add overhead and skew measured kernel time.
# opencl_summary = true
# opencl_trace   = true
# device_trace   = coarse
# data_transfer_trace = coarse

# Per-CU and per-memory stall trace -- needed only for deep performance work.
# stall_trace = all

# Generate timeline / profile reports (puts xclbin.run_summary etc. into cwd).
# Cheap to enable but creates files on every run.
# native_xrt_trace = true
