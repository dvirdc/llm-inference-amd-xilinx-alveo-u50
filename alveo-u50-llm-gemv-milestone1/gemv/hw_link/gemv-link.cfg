# ============================================================================
#  gemv-link.cfg  --  v++ linker config for the Alveo U50 GEMV xclbin.
# ----------------------------------------------------------------------------
#  Picked up automatically by gemv/hw_link/CMakeLists.txt when the Vitis IDE
#  drives the link step (or when you run cmake/make from the command line on
#  the gemv system project).
#
#  Port names must match the HLS m_axi `bundle=` names in
#  gemv_kernel/src/gemv_int8.cpp. With:
#     nk=gemv_int8:1:gemv_int8_1
#  v++ creates one CU named gemv_int8_1, so its ports are
#     gemv_int8_1.m_axi_gmem0   (weights)
#     gemv_int8_1.m_axi_gmem1   (x)
#     gemv_int8_1.m_axi_gmem2   (y)
#  In `sp=` you can use the kernel argument name (e.g. `weights`) or the AXI
#  port name (e.g. `m_axi_gmem0`); both resolve to the same physical port.
# ============================================================================

[connectivity]

# One compute unit named gemv_int8_1.
nk=gemv_int8:1:gemv_int8_1

# Milestone-1 mapping: one HBM channel per port. Simple, easy to debug.
sp=gemv_int8_1.weights:HBM[0]
sp=gemv_int8_1.x:HBM[1]
sp=gemv_int8_1.y:HBM[2]

# ----------------------------------------------------------------------------
# Future mapping examples (commented out -- enable in later milestones).
# ----------------------------------------------------------------------------
# Spread the weight matrix across 8 HBM channels for higher read bandwidth.
# The kernel must be re-written with 8 separate m_axi ports (gmem0..gmem7)
# and a load function that round-robins across them.
#
# sp=gemv_int8_1.weights0:HBM[0]
# sp=gemv_int8_1.weights1:HBM[1]
# sp=gemv_int8_1.weights2:HBM[2]
# sp=gemv_int8_1.weights3:HBM[3]
# sp=gemv_int8_1.weights4:HBM[4]
# sp=gemv_int8_1.weights5:HBM[5]
# sp=gemv_int8_1.weights6:HBM[6]
# sp=gemv_int8_1.weights7:HBM[7]
# sp=gemv_int8_1.x:HBM[8]
# sp=gemv_int8_1.y:HBM[9]
#
# Multiple compute units (4-CU example for row-parallel GEMV):
# nk=gemv_int8:4:gemv_int8_1.gemv_int8_2.gemv_int8_3.gemv_int8_4
# sp=gemv_int8_1.weights:HBM[0]
# sp=gemv_int8_2.weights:HBM[1]
# sp=gemv_int8_3.weights:HBM[2]
# sp=gemv_int8_4.weights:HBM[3]
