# xrt.ini used when launching the host against real Alveo U50 hardware from
# Vitis IDE. Picked up via XRT_INI_PATH env var set in ../../../_ide/launch.json.
#
# Reference: https://xilinx.github.io/XRT/master/html/xrt_ini.html

[Debug]
power_profile=false
opencl_trace=false
lop_trace=false
xrt_trace=false

# app_debug lets you attach xgdb and inspect device-side state.
app_debug=true

# Lightweight trace so Vitis Analyzer can show timeline/CU activity.
# These add some overhead -- disable for production timing measurements.
device_trace=coarse
stall_trace=coarse
trace_buffer_size=1M
continuous_trace=false
continuous_trace_interval=10
host_trace=true

[Emulation]
debug_mode=off
