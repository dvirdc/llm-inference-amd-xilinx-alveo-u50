# xrt.ini used when launching the host under HW_EMU from Vitis IDE.
# Picked up via XRT_INI_PATH env var set in ../../../_ide/launch.json.
#
# Reference: https://xilinx.github.io/XRT/master/html/xrt_ini.html

[Debug]
# Keep heavy profiling off so emulation finishes quickly.
power_profile=false
opencl_trace=false
lop_trace=false
xrt_trace=false

# app_debug enables xgdb to step through kernel HLS source.
app_debug=true
host_trace=true

[Emulation]
debug_mode=off
