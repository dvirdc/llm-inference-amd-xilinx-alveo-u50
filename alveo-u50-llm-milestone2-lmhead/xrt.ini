# xrt.ini -- XRT runtime config. Picked up automatically when placed next
# to the host executable.
#
# Reference: https://xilinx.github.io/XRT/master/html/xrt_ini.html
#
# We keep this minimal so per-token timings printed by main_hybrid_lmhead
# are not skewed by tracing overhead. Enable the commented sections only
# when actively diagnosing.

[Runtime]
verbosity = 4
runtime_log = console

[Debug]
# Lightweight host-side trace -- safe to keep on. xrt::run::wait() times
# remain accurate.
# host_trace = true

# Heavier instrumentation -- uncomment when capturing for Vitis Analyzer.
# device_trace = coarse
# stall_trace  = coarse
# trace_buffer_size = 1M
# native_xrt_trace  = true

[Emulation]
debug_mode = off
