# xrt.ini used when launching main_hybrid_lmhead against real Alveo U50
# hardware from Vitis IDE. Loaded via XRT_INI_PATH set in
# ../../_ide/launch.json.

[Debug]
power_profile=false
opencl_trace=false
lop_trace=false
xrt_trace=false

app_debug=true

# Lightweight tracing so Vitis Analyzer shows CU timeline. These add
# ~5% overhead -- disable for production timing measurements.
device_trace=coarse
stall_trace=coarse
trace_buffer_size=1M
continuous_trace=false
continuous_trace_interval=10
host_trace=true

[Emulation]
debug_mode=off
