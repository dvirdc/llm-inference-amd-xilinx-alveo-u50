# xrt.ini used when launching main_hybrid_lmhead under HW_EMU from
# Vitis IDE. Loaded via XRT_INI_PATH set in ../../_ide/launch.json.

[Debug]
power_profile=false
opencl_trace=false
lop_trace=false
xrt_trace=false

# app_debug lets xgdb step into the kernel-side HLS source.
app_debug=true
host_trace=true

[Emulation]
debug_mode=off
