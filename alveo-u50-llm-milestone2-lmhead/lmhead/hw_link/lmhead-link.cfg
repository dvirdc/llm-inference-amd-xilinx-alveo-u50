# ============================================================================
#  lmhead-link.cfg  --  v++ linker config for the Milestone-2 xclbin.
# ----------------------------------------------------------------------------
#  Picked up by lmhead/hw_link/CMakeLists.txt when the Vitis IDE drives
#  the link step. Mirrors configs/u50_hbm.cfg used by the Makefile flow --
#  keep them in sync if you change one.
#
#  The CU instance name `gemv_int8_1` comes from the `nk=` line; the
#  per-port memory mapping below uses the HLS bundle names from the
#  kernel (`weights`, `x`, `y` resolve to the m_axi gmem0/1/2 ports).
# ============================================================================

[connectivity]

nk=gemv_int8:1:gemv_int8_1

sp=gemv_int8_1.weights:HBM[0]
sp=gemv_int8_1.x:HBM[1]
sp=gemv_int8_1.y:HBM[2]

# Future milestones (multi-HBM sharding, multi-CU) -- see configs/u50_hbm.cfg
# in the Makefile tree for the commented examples.
