part=xcu50-fsvh2104-2-e

# The kernel source lives in the Makefile tree at src/kernels/.
# We do NOT duplicate it -- v++ reads it from there directly via the
# relative syn.file path (resolved against the lmhead_kernel/ cwd
# from which Vitis IDE invokes v++).
[hls]
clock=4ns
flow_target=vitis
syn.file=../src/kernels/gemv_int8.cpp
syn.file_cflags=../src/kernels/gemv_int8.cpp,-g
syn.top=gemv_int8
package.ip.name=gemv_int8
package.output.format=xo
syn.dataflow.strict_mode=warning
syn.debug.enable=1
syn.interface.m_axi_addr64=1
syn.interface.m_axi_auto_max_ports=0
syn.interface.m_axi_conservative_mode=1
syn.rtl.deadlock_detection=sim
syn.rtl.kernel_profile=1
package.output.syn=true

debug=1
save-temps=1
temp_dir=lmhead_kernel
report_dir=lmhead_kernel/reports
log_dir=lmhead_kernel/logs
